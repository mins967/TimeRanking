<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>시간 랭킹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <div class="top-bar-text">
        <h1 class="title">시간 랭킹</h1>
        <p class="subtitle">기록 시간이 길수록 순위가 올라갑니다.</p>
      </div>
      <button type="button" class="btn btn-admin" id="admin-toggle" aria-pressed="false">
        관리자 모드
      </button>
    </header>

    <section class="hero panel" aria-labelledby="hero-heading">
      <div class="hero-head">
        <h2 id="hero-heading" class="hero-title">리더보드</h2>
        <span class="count" id="record-count">0명</span>
      </div>

      <div class="hero-body">
        <div class="champion-zone" id="champion-zone" hidden></div>

        <ol class="ranking ranking-rest" id="ranking-list"></ol>

        <p class="empty" id="empty-state">아직 등록된 기록이 없습니다.</p>
      </div>
    </section>

    <section class="panel form-panel admin-only" id="admin-panel" hidden aria-labelledby="form-heading">
      <h2 id="form-heading" class="panel-title">기록 관리</h2>
      <p class="admin-hint">관리자 모드에서만 기록을 추가·삭제할 수 있습니다.</p>
      <form class="record-form" id="record-form" novalidate>
        <div class="field">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" placeholder="표시 이름" maxlength="40" autocomplete="off" disabled />
        </div>
        <div class="field field-time">
          <span class="label-row">시간</span>
          <div class="time-inputs">
            <div class="field-inline">
              <label for="minutes" class="sr-only">분</label>
              <input type="number" id="minutes" name="minutes" min="0" max="999" step="1" placeholder="0" inputmode="numeric" disabled />
              <span class="unit">분</span>
            </div>
            <div class="field-inline">
              <label for="seconds" class="sr-only">초</label>
              <input type="number" id="seconds" name="seconds" min="0" max="59.999" step="any" placeholder="0" inputmode="decimal" disabled />
              <span class="unit">초</span>
            </div>
          </div>
          <p class="hint">총 시간만 입력해도 됩니다. (예: 1분 23.45초)</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btn-submit" disabled>등록</button>
          <button type="button" class="btn btn-ghost" id="btn-clear-all" disabled>전체 삭제</button>
        </div>
      </form>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
